<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://kit.fontawesome.com/bf7220ad33.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
</head>

<body>
  <!-- Start coding here -->
  <div class="chatroom">
    <header class="chatroom__header">Techup Chatroom</header>
    <main class="chatroom__body">
      <div class="chat-row chat-row--left">
        <div class="chat-bubble chat-bubble--gray">😍</div>
      </div>
      <div class="chat-row chat-row--right">
        <div class="chat-bubble chat-bubble--green chat-bubble--tail">สวัสดีจ้า</div>
      </div>
      <div class="chat-row chat-row--right">
        <div class="chat-bubble chat-bubble--light">
          Coding สนุกจังเลย
          <button type="button" class="chat-bubble__close" aria-label="Close">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </div>
      <div class="chat-row chat-row--left">
        <div class="chat-bubble chat-bubble--gray">🥳</div>
      </div>
      <div class="chat-row chat-row--right">
        <div class="chat-bubble chat-bubble--green">🥳😍</div>
      </div>
    </main>
  </div>
</body>

</html>
